openapi: 3.0.3
info:
  title: User Service API
  description: |
    User authentication and profile management microservice for the Food Ordering System.
    Handles registration, login, JWT issuance, and profile management.
    Also exposes an internal `/api/auth/validate` endpoint used by other microservices to verify JWTs.
  version: 1.0.0
  contact:
    name: Student 1 - User Service
servers:
  - url: http://localhost:3001
    description: Local development
  - url: https://user-service.your-domain.com
    description: Production (AWS ECS)

tags:
  - name: Authentication
    description: Register and login endpoints
  - name: User Profile
    description: Profile management endpoints
  - name: Internal
    description: Internal endpoints for inter-service communication

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: user-service
                  timestamp:
                    type: string
                    format: date-time

  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already registered

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Login and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials

  /api/auth/validate:
    get:
      tags: [Internal]
      summary: Validate a JWT token (used by other microservices)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  user:
                    $ref: "#/components/schemas/UserSummary"
        "401":
          description: Invalid or expired token

  /api/users/profile:
    get:
      tags: [User Profile]
      summary: Get logged-in user's profile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      tags: [User Profile]
      summary: Update logged-in user's profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      tags: [User Profile]
      summary: Deactivate account
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Account deactivated
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 8
          example: Password123
        phone:
          type: string
          example: "+94771234567"
        role:
          type: string
          enum: [customer, restaurant_owner]
          default: customer

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [customer, restaurant_owner, admin]
        phone:
          type: string
        address:
          $ref: "#/components/schemas/Address"
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        phone:
          type: string

    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        country:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          $ref: "#/components/schemas/Address"

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
