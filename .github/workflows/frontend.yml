name: Frontend CI/CD

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [master]
    paths:
      - "frontend/**"

env:
  SERVICE_NAME: frontend

jobs:
  deploy:
    name: Build & Deploy to Azure App Service
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_USER_SERVICE_URL: ${{ secrets.USER_SERVICE_URL }}
          NEXT_PUBLIC_RESTAURANT_SERVICE_URL: ${{ secrets.RESTAURANT_SERVICE_URL }}
          NEXT_PUBLIC_ORDER_SERVICE_URL: ${{ secrets.ORDER_SERVICE_URL }}
          NEXT_PUBLIC_NOTIFICATION_SERVICE_URL: ${{ secrets.NOTIFICATION_SERVICE_URL }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: food-ordering-frontend-svc
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}
          package: ./frontend
